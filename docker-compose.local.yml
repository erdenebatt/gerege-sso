version: '3.8'

# Gerege SSO - Local Development Stack
# Only postgres, redis, backend, and frontend — no nginx/SSL/monitoring
# Usage: docker compose -f docker-compose.local.yml --env-file .env.local up -d

services:
  # ===================
  # Database Services
  # ===================
  postgres:
    image: postgres:15-alpine
    container_name: gerege-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - gerege-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gerege-local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - local_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - gerege-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ===================
  # Application Services
  # ===================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: gerege-local-backend
    restart: unless-stopped
    environment:
      - GIN_MODE=debug
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - APPLE_KEY_ID=${APPLE_KEY_ID}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY}
      - APPLE_REDIRECT_URL=${APPLE_REDIRECT_URL}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - FACEBOOK_REDIRECT_URL=${FACEBOOK_REDIRECT_URL}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET}
      - TWITTER_REDIRECT_URL=${TWITTER_REDIRECT_URL}
      - PUBLIC_URL=${PUBLIC_URL}
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gerege-local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gerege-local-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - gerege-local

networks:
  gerege-local:
    driver: bridge

volumes:
  local_postgres_data:
  local_redis_data:
