<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#7dd3fc;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.3" />
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.15" />
    </linearGradient>

    <linearGradient id="waveGrad3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#7dd3fc;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Bottom wave 1 -->
  <path d="M0,850 C300,750 600,900 960,820 C1320,740 1620,880 1920,800 L1920,1080 L0,1080 Z" fill="url(#waveGrad1)"/>

  <!-- Bottom wave 2 -->
  <path d="M0,900 C400,820 700,950 1000,880 C1300,810 1600,920 1920,860 L1920,1080 L0,1080 Z" fill="url(#waveGrad2)"/>

  <!-- Bottom wave 3 -->
  <path d="M0,950 C350,900 650,1000 960,940 C1270,880 1570,980 1920,920 L1920,1080 L0,1080 Z" fill="url(#waveGrad3)"/>

  <!-- Top decorative curve -->
  <path d="M1920,0 L1920,150 C1700,100 1400,180 1100,120 C800,60 500,140 200,100 C100,85 50,90 0,100 L0,0 Z" fill="url(#waveGrad2)" opacity="0.5"/>

  <!-- Subtle circles -->
  <circle cx="200" cy="200" r="300" fill="url(#waveGrad1)" opacity="0.3"/>
  <circle cx="1700" cy="300" r="250" fill="url(#waveGrad2)" opacity="0.2"/>
</svg>
