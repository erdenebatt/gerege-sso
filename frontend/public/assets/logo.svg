<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" opacity="0.2"/>
  <!-- Main paiza (Gerege) shape -->
  <rect x="30" y="20" width="40" height="60" rx="4" fill="url(#grad1)"/>
  <!-- Inner details -->
  <rect x="35" y="28" width="30" height="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="35" y="35" width="30" height="3" fill="rgba(255,255,255,0.6)"/>
  <rect x="35" y="42" width="30" height="3" fill="rgba(255,255,255,0.6)"/>
  <!-- Circle seal -->
  <circle cx="50" cy="58" r="10" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <text x="50" y="62" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">G</text>
  <!-- Hole at top -->
  <circle cx="50" cy="15" r="4" fill="#1a1a2e"/>
</svg>
