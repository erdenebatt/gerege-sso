<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холбогдсон аппликейшнүүд — Gerege SSO</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .grants-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        .grants-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .grants-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .grants-header p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .grant-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .grant-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }
        .grant-info {
            flex: 1;
        }
        .grant-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .grant-meta {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        .grant-meta span {
            margin-right: 16px;
        }
        .grant-scopes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .scope-badge {
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .revoke-btn {
            background: rgba(255,87,87,0.15);
            border: 1px solid rgba(255,87,87,0.3);
            color: #ff5757;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .revoke-btn:hover {
            background: rgba(255,87,87,0.25);
            border-color: rgba(255,87,87,0.5);
        }
        .revoke-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 15px;
            line-height: 1.6;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .back-link:hover {
            color: #00ff88;
        }
        @media (max-width: 600px) {
            .grant-card {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }
            .revoke-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="grants-container">
        <a href="/" class="back-link">&larr; Нүүр хуудас</a>

        <div class="grants-header">
            <div class="logo-container">
                <img src="/assets/logo.svg" alt="Gerege SSO" class="logo">
            </div>
            <h1>Холбогдсон аппликейшнүүд</h1>
            <p>Эдгээр аппликейшнүүд таны Gerege дансанд хандах эрхтэй.</p>
        </div>

        <div id="grantsList">
            <div class="loading">Уншиж байна...</div>
        </div>

        <div class="footer">
            <p>&copy; 2025 Gerege SSO</p>
        </div>
    </div>

    <script>
        (function() {
            var token = localStorage.getItem('gerege_token') || '';

            function formatDate(dateStr) {
                if (!dateStr) return '—';
                var d = new Date(dateStr);
                return d.toLocaleDateString('mn-MN', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            }

            function loadGrants() {
                fetch('/api/auth/grants', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(function(resp) {
                    if (!resp.ok) {
                        if (resp.status === 401) {
                            window.location.href = '/?redirect=' + encodeURIComponent('/grants.html');
                            return;
                        }
                        throw new Error('Failed to load grants');
                    }
                    return resp.json();
                })
                .then(function(data) {
                    renderGrants(data.grants || []);
                })
                .catch(function(err) {
                    document.getElementById('grantsList').innerHTML =
                        '<div class="empty-state"><p>Алдаа гарлаа. Дахин оролдоно уу.</p></div>';
                });
            }

            function renderGrants(grants) {
                var container = document.getElementById('grantsList');

                if (!grants || grants.length === 0) {
                    container.innerHTML = '<div class="empty-state">' +
                        '<div class="empty-state-icon">&#x1f512;</div>' +
                        '<p>Одоогоор ямар ч аппликейшн таны дансанд холбогдоогүй байна.</p>' +
                        '</div>';
                    return;
                }

                var html = '';
                grants.forEach(function(grant) {
                    html += '<div class="grant-card" data-id="' + grant.id + '">';
                    html += '<div class="grant-info">';
                    html += '<div class="grant-name">' + escapeHtml(grant.client_name) + '</div>';
                    html += '<div class="grant-meta">';
                    html += '<span>Холбогдсон: ' + formatDate(grant.granted_at) + '</span>';
                    if (grant.last_used_at) {
                        html += '<span>Сүүлд ашигласан: ' + formatDate(grant.last_used_at) + '</span>';
                    }
                    html += '</div>';
                    html += '<div class="grant-scopes">';
                    (grant.scopes || []).forEach(function(scope) {
                        html += '<span class="scope-badge">' + escapeHtml(scope) + '</span>';
                    });
                    html += '</div>';
                    html += '</div>';
                    html += '<button class="revoke-btn" onclick="revokeGrant(\'' + grant.id + '\', this)">Цуцлах</button>';
                    html += '</div>';
                });

                container.innerHTML = html;
            }

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            window.revokeGrant = function(grantId, btn) {
                if (!confirm('Энэ аппликейшны хандах эрхийг цуцлах уу?')) {
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Цуцалж байна...';

                fetch('/api/auth/grants/' + grantId, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(function(resp) {
                    if (!resp.ok) {
                        throw new Error('Failed to revoke');
                    }
                    // Remove the card with animation
                    var card = btn.closest('.grant-card');
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(20px)';
                    setTimeout(function() {
                        card.remove();
                        // Check if list is empty
                        var remaining = document.querySelectorAll('.grant-card');
                        if (remaining.length === 0) {
                            loadGrants();
                        }
                    }, 300);
                })
                .catch(function(err) {
                    alert('Алдаа гарлаа. Дахин оролдоно уу.');
                    btn.disabled = false;
                    btn.textContent = 'Цуцлах';
                });
            };

            loadGrants();
        })();
    </script>
</body>
</html>
