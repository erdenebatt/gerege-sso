<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerege SSO - Нэвтрэх</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <img src="/assets/logo.svg" alt="Gerege SSO" class="logo">
            </div>
            <h1>Gerege SSO</h1>
            <p class="subtitle">Нэгдсэн нэвтрэлтийн систем</p>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <button onclick="loginWithGoogle()" class="google-btn">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google-ээр нэвтрэх
            </button>

            <button onclick="loginWithApple()" class="apple-btn">
                <svg class="apple-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="#000000"/>
                </svg>
                Apple-ээр нэвтрэх
            </button>

            <button onclick="loginWithFacebook()" class="facebook-btn">
                <svg class="facebook-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#ffffff"/>
                </svg>
                Facebook-ээр нэвтрэх
            </button>

            <button onclick="loginWithTwitter()" class="twitter-btn">
                <svg class="twitter-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#ffffff"/>
                </svg>
                X-ээр нэвтрэх
            </button>

            <div class="divider">
                <span>эсвэл</span>
            </div>

            <p class="info-text">
                Google, Apple эсвэл Facebook бүртгэлээр нэвтэрч, регистрийн дугаараараа баталгаажуулна уу.
            </p>
        </div>

        <footer class="footer">
            <p>&copy; 2024 Gerege SSO. Бүх эрх хуулиар хамгаалагдсан.</p>
            <p class="footer-links">
                <a href="/privacy.html">Нууцлалын бодлого</a> |
                <a href="/terms.html">Үйлчилгээний нөхцөл</a> |
                <a href="/data-deletion.html">Өгөгдөл устгах</a>
            </p>
        </footer>
    </div>

    <script>
        // Check for error in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = decodeURIComponent(error);
            errorDiv.style.display = 'block';
        }

        // Check if already logged in
        const token = localStorage.getItem('gerege_token');
        if (token) {
            // Verify token is still valid
            fetch('/api/auth/me', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => {
                if (response.ok) {
                    // Token is valid, show user info or redirect
                    window.location.href = '/callback.html?existing=true';
                } else {
                    // Token expired, clear it
                    localStorage.removeItem('gerege_token');
                }
            })
            .catch(() => {
                localStorage.removeItem('gerege_token');
            });
        }

        function loginWithGoogle() {
            window.location.href = '/api/auth/google';
        }

        function loginWithApple() {
            window.location.href = '/api/auth/apple';
        }

        function loginWithFacebook() {
            window.location.href = '/api/auth/facebook';
        }

        function loginWithTwitter() {
            window.location.href = '/api/auth/twitter';
        }
    </script>
</body>
</html>
